<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sneha 🤍</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Allura&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Loading Screen -->

<div id="loading-screen">

    <div class="loading-content">

        <div class="heart-loader">🤍</div>

        <h2>Loading your little corner...</h2>

    </div>

</div>

<!-- Opening -->

<section id="opening">

<div class="background-blur"></div>

<div class="floating-hearts"></div>

<div class="glass-card">

<h1>Hey Sneha... 🤍</h1>

<p>This little corner of the internet was made just for you.</p>

<button id="openBtn">
✨ Open
</button>

</div>

</section>

<!-- Music -->

<audio id="bgMusic">
<source src="assets/music/music.mp3" type="audio/mpeg">
</audio>

<!-- Memory Section -->

<section id="memorySection">

<div id="photoFrame">

<img id="memoryPhoto" src="" alt="Memory">

</div>

</section>

<!-- Ending -->

<section id="ending">

<div class="ending-card">

<h1>
It was you...
<br><br>
From the moment we met. 🤍
</h1>

<p>— From Ishuuuuuu</p>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
